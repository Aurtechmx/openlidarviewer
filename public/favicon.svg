<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!--
    OpenLiDARViewer mark — a point-cloud scatter rising left-to-right like a
    terrain profile, on the brand-dark rounded square (#0a0e1a, the same
    colour as theme-color / the app background). Three dot rows: a bold
    ridge line, a fainter ground echo beneath it, and a few sparse high
    returns. Dot sizes grow with elevation so the rising shape still reads
    at 16 px, where the opacity tiers collapse into simple light/dark.
  -->
  <rect width="64" height="64" rx="14" fill="#0a0e1a"/>
  <g fill="#22dcff">
    <!-- Ridge line — the primary rising profile. -->
    <circle cx="10" cy="49" r="3"/>
    <circle cx="19" cy="44" r="3.5"/>
    <circle cx="28" cy="38" r="4"/>
    <circle cx="37" cy="31" r="4.5"/>
    <circle cx="46" cy="23" r="5"/>
    <circle cx="55" cy="15" r="5.5"/>
    <!-- Ground echo — a quieter second row beneath the ridge. -->
    <circle cx="14" cy="56" r="2.4" opacity="0.55"/>
    <circle cx="24" cy="52" r="2.6" opacity="0.55"/>
    <circle cx="33" cy="47" r="2.8" opacity="0.55"/>
    <circle cx="43" cy="40" r="3" opacity="0.55"/>
    <circle cx="52" cy="33" r="3.2" opacity="0.55"/>
    <!-- Sparse high returns — canopy / noise above the ridge. -->
    <circle cx="20" cy="32" r="1.6" opacity="0.4"/>
    <circle cx="31" cy="22" r="1.8" opacity="0.4"/>
    <circle cx="44" cy="12" r="1.6" opacity="0.4"/>
  </g>
</svg>
