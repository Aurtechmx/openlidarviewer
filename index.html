<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Open any 3D scan — drone LiDAR or phone scan — instantly and privately, in a browser tab." />
    <meta name="theme-color" content="#0a0e1a" />

    <!-- Share metadata: Open Graph (also read by most chat apps) + Twitter card. -->
    <meta property="og:title" content="OpenLiDARViewer" />
    <meta property="og:description" content="Open any 3D scan — drone LiDAR or phone scan — instantly and privately, in a browser tab." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://lidar.aurtech.mx/" />
    <meta property="og:image" content="https://lidar.aurtech.mx/og-card.jpg" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Icons + PWA manifest (served from public/, copied to the dist root). -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <title>OpenLiDARViewer</title>
    <style>html, body { background: #0a0e1a; }</style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
