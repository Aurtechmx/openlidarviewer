name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Production build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: build-and-test
    # Advisory: the end-to-end tests drive a headless browser, and GPU-backed
    # rendering varies across CI runners. A failure here is reported but does
    # not block the build — build-and-test is the hard gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: End-to-end tests
        run: npm run test:e2e
