name: CI

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

# Least privilege: every job only needs to read the checked-out code. Matches
# the security workflow; tighten here so a compromised action can't write to the
# repo or mint tokens.
permissions:
  contents: read

jobs:
  # Static checks + both build contracts. Cheap and fast; everything else
  # depends on it so a typecheck or bundle regression fails before the heavier
  # test shards and the browser jobs run.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Main-deferral lint (no top-level viewer.* deref outside viewerLoaded)
        run: npm run lint:main-deferral
      - name: Inline dynamic import lint (no raw import('./…') in main.ts — obfuscator-scramble guard)
        run: npm run lint:inline-imports
      - name: unsafeHtml lint (no user-derived string reaches an innerHTML sink)
        run: npm run lint:unsafe-html
      - name: Release sync (version/lock/README/CHANGELOG/notes consistent)
        run: npm run lint:release-sync
      - name: Layer-boundary lint (science/core imports no UI or three.js)
        run: npm run lint:layer-boundaries
      - name: Claim-register lint (YAML ↔ runtime registry in sync, no banned wording)
        run: npm run lint:claim-register
      - name: No source files git-ignored
        run: npm run lint:no-ignored-src
      - name: Generated claim registry is committed (regenerate → no diff)
        run: npm run gen:claim-registry && git diff --exit-code
      - name: Bucket partition integrity (every test file in exactly one bucket)
        run: npm run test:buckets:verify
      # Two DISTINCT size contracts, both enforced:
      #  • test:build  → PLAIN build + chunk-isolation (only vendor-three-webgpu
      #    may exceed the 500 KiB isolation threshold).
      #  • build:live + check:bundle → the OBFUSCATED build that actually ships,
      #    gated against its own (larger) per-chunk budget.
      # The live index is legitimately larger than the plain one; gating each
      # build against its own rule keeps both honest instead of running the
      # plain-build isolation rule against the shipped artifact.
      - name: Chunk-isolation contract (plain build)
        run: npm run test:build
      - name: Live-shell bundle budget (obfuscated build that ships)
        run: npm run build:live && npm run check:bundle

  # Test buckets as a matrix: a failure points at one bucket, output stays
  # small, and the four shards run in parallel instead of one monolithic run.
  test:
    runs-on: ubuntu-latest
    needs: verify
    # Bound a hung bucket so it fails fast instead of burning the default 360 min.
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        bucket: [unit, export, terrain, ui, slow]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # scripts/test-bucket.mjs is the SINGLE source of the worker cap (2, to
      # match these ~2-core runners): passing --maxWorkers here as well would
      # make vitest reject a duplicate single-value option before any test runs.
      # --reporter=dot keeps the log small so a failure is easy to locate.
      - name: Test bucket — ${{ matrix.bucket }}
        run: npm run test:${{ matrix.bucket }} -- --reporter=dot

  smoke:
    runs-on: ubuntu-latest
    needs: verify
    # Blocking gate: the smoke spec catches the class of bug where the bundle
    # builds and the unit tests pass but the page throws on load in a real
    # browser. Two specs, ~10 s; failure here means the artifact should not
    # ship.
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Smoke tests (normal build)
        run: npm run test:smoke
      - name: Smoke tests (live / obfuscated artifact)
        # Boots the build users actually get: the obfuscator scrambles dynamic
        # import() / worker-URL string literals, so a chunk that loads fine in
        # the plain build can 404 only on the live build. This is the gate that
        # catches that class of live-only breakage.
        run: npm run test:smoke:live
      - name: Mobile responsive smoke (320 / 375 viewports — blocking)
        # Deterministic layout/touch-target checks at the smallest viewports —
        # no GPU-variable paths, so unlike the advisory e2e job below this one
        # BLOCKS. Backs the mobile-usability claims in the release notes.
        run: npx playwright test tests/e2e/visualsStudioMobile.spec.ts

  e2e:
    runs-on: ubuntu-latest
    needs: verify
    # Advisory: the broader end-to-end suite drives a headless browser
    # through real rendering flows, and GPU-backed paths vary across CI
    # runners. A failure here is reported but does not block the build —
    # the smoke gate above is the structural hard gate for browser
    # correctness.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: End-to-end tests
        run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
