# Security CI — dependency vulnerabilities.
# Complements ci.yml (typecheck / build / tests, which already run the
# unsafeHtml + bundle guards). Kept as a separate workflow so it can run on a
# schedule and surface independently of the build matrix.
name: security

on:
  push:
    branches: ["**"]
    # Tags too. The audit ran on every branch push and on a weekly schedule
    # but not on the ref that actually gets published, so a tag could be cut
    # and released without the production dependency tree ever being checked
    # at that commit — the one moment the answer is load-bearing.
    tags:
      - 'v*'
  pull_request:
  schedule:
    # Weekly, so newly-disclosed CVEs in pinned deps surface even without a push.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit (runtime deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Fail the job only on high/critical advisories in shipped (non-dev) deps;
      # lower-severity transitive dev noise is reported but not blocking.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
