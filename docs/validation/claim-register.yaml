# OpenLiDARViewer — machine-readable scientific claim register
# Research-hardening Phase 1. See docs/validation/EVIDENCE_MODEL.md for the
# ladder and field definitions, and src/validation/evidenceLevel.ts for the
# identifiers + gate logic.
#
# Honesty rules (do not violate when editing):
#   - currentEvidence must reflect evidence that EXISTS today. Nothing here is
#     E4+ yet: no independent cross-implementation or field validation has been
#     run. Synthetic known-truth fixtures are E3, not accuracy.
#   - externalValidationStatus is `pending` wherever external data is required
#     and unavailable. Never infer it from density / format / metadata.
#   - prohibitedClaim lists statements the current evidence does NOT support.
#
# This is a living document; update an entry in the same change that alters its
# product. A product with no entry is treated as E0 / not exportable.
#
# Phase 3–4 tooling (v0.5.8) — mechanisms now exist to REACH the required
# levels; running them is still pending, so no level below has changed:
#   - Cross-implementation harness: src/validation/crossCheck.ts +
#     docs/validation/cross-implementation.md. Every reference slot is pending;
#     an E4 promotion needs a real PDAL/GDAL/CloudCompare reference committed.
#   - Honest estimators: src/terrain/validate/spatialBlockHoldout.ts
#     (spatially-blocked hold-out, less optimistic than random point hold-out,
#     with a bootstrap CI) and src/terrain/validate/reliabilitySplit.ts
#     (measured-cell empirical reliability + Wilson CI, kept distinct from
#     interpolated model-based support).
#   - Typed units: src/units/units.ts makes source-unit / metre confusion a
#     compile error at the measurement + CRS boundaries.

schemaVersion: 1
# Claims last reviewed at 0.5.9. Neither the 0.6.0-alpha.1 wave (streaming decode,
# session import, density units, project-frame foundation) nor alpha.2 (test gates,
# composition root, architecture map) changed what these terrain / measurement
# algorithms compute, so their evidence is inherited unchanged into the alpha.
# alpha.2 DID correct two unit/axis defects at the reporting boundary — box height
# now follows the scan up-axis, and the Horn slope guard rejects a non-positive
# cell size — but neither alters an algorithm's evidence level.
softwareVersion: 0.6.0-alpha.2
generated: 2026-07-19
validationOwner: A. Urias / Aurtech

